<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micro-SOC - Asistente de IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col justify-between font-sans">

    <header class="w-full max-w-6xl mx-auto px-6 py-4 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center space-x-2">
            <a href="index.html" class="text-gray-400 hover:text-white transition mr-2">← Volver</a>
            <span class="text-2xl">🤖</span>
            <span class="text-xl font-bold tracking-wider text-blue-400">Analista IA - Nivel 1</span>
        </div>
        <span class="text-xs bg-green-950 text-green-400 border border-green-700 px-3 py-1 rounded-full font-mono flex items-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span> En Línea
        </span>
    </header>

    <main class="w-full max-w-3xl mx-auto p-4 flex-grow flex flex-col justify-between overflow-hidden h-[calc(100vh-140px)]">
        
        <div id="chatWindow" class="flex-grow overflow-y-auto space-y-4 p-4 border border-gray-800 bg-gray-950/50 rounded-2xl mb-4 scrollbar-thin scrollbar-thumb-gray-800">
            
            <div class="flex items-start space-x-3 max-w-[85%]">
                <div class="bg-blue-600 text-white p-2 rounded-xl text-lg shadow-md">🤖</div>
                <div class="bg-gray-800 text-gray-200 p-3 rounded-2xl rounded-tl-none border border-gray-700 text-sm">
                    Saludos. Soy el asistente automatizado del Micro-SOC. Puedo ayudarte a evaluar sospechas de phishing, revisar si tu red hogareña es vulnerable o guiarte para levantar un ticket de soporte técnico. ¿Qué anomalía digital estás experimentando?
                </div>
            </div>

        </div>

        <form id="chatForm" class="flex gap-2 bg-gray-800 p-2 rounded-xl border border-gray-700">
            <input 
                type="text" 
                id="userInput" 
                placeholder="Escribe tu consulta de seguridad aquí..." 
                class="flex-grow bg-transparent text-sm text-white placeholder-gray-500 focus:outline-none px-3"
                required
                autocomplete="off"
            >
            <button 
                type="submit" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-lg font-medium text-sm transition duration-200 shadow-md flex items-center space-x-1"
            >
                <span>Enviar</span>
                <span>⚡</span>
            </button>
        </form>

    </main>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const chatForm = document.getElementById('chatForm');
        const userInput = document.getElementById('userInput');

        // =========================================================
        // REEMPLAZA ESTOS DATOS CON TUS CREDENCIALES DE BOTPRESS
        // =========================================================
        const BOT_ID = "a189e7b5-3cb5-4cb5-9ee1-1898247e2d0f"; 
        const BOT_API_KEY = "bp_bak_IolEnDY6ykP_AM01qrwuS2Ku8maN16-NapAF";
        
        // El endpoint estándar para interactuar con la API de Botpress Chat v1
        const BASE_URL = `https://chat.botpress.cloud/v1`; 

        // Variable para rastrear la conversación actual en la sesión del navegador
        let conversationId = localStorage.getItem('micro_soc_conv_id') || null;

        // Función para agregar mensajes a la pantalla
        function appendMessage(sender, text, avatar) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `flex items-start space-x-3 max-w-[85%] ${sender === 'user' ? 'ml-auto flex-row-reverse space-x-reverse' : ''}`;
            
            const avatarBg = sender === 'user' ? 'bg-indigo-600' : 'bg-blue-600';
            const bubbleBg = sender === 'user' ? 'bg-indigo-900/40 border-indigo-700 text-indigo-100 rounded-tr-none' : 'bg-gray-800 border-gray-700 text-gray-200 rounded-tl-none';

            messageDiv.innerHTML = `
                <div class="${avatarBg} text-white p-2 rounded-xl text-lg shadow-md">${avatar}</div>
                <div class="${bubbleBg} p-3 rounded-2xl border text-sm shadow-sm whitespace-pre-line">${text}</div>
            `;
            
            chatWindow.appendChild(messageDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight; 
        }

        // Función para inicializar una conversación en Botpress si no existe una
        async function getOrCreateConversation() {
            if (conversationId) return conversationId;

            try {
                const response = await fetch(`${BASE_URL}/conversations`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${BOT_API_KEY}`,
                        'x-bot-id': BOT_ID,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({})
                });
                const data = await response.json();
                conversationId = data.conversation.id;
                localStorage.setItem('micro_soc_conv_id', conversationId);
                return conversationId;
            } catch (err) {
                console.error("Error creando la conversación en Botpress:", err);
            }
        }

        // Escuchar el evento de envío
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageText = userInput.value.trim();
            if (!messageText) return;

            // 1. Mostrar el mensaje del usuario en pantalla
            appendMessage('user', messageText, '👤');
            userInput.value = '';

            // 2. Colocar un mensaje de "Escribiendo..." temporal
            const loadingDiv = document.createElement('div');
            loadingDiv.className = "flex items-start space-x-3 max-w-[85%] animate-pulse";
            loadingDiv.innerHTML = `
                <div class="bg-blue-600 text-white p-2 rounded-xl text-lg">🤖</div>
                <div class="bg-gray-800 text-gray-400 p-3 rounded-2xl rounded-tl-none border border-gray-700 text-sm italic">
                    Analizando trazas de datos...
                </div>
            `;
            chatWindow.appendChild(loadingDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;

            try {
                // Asegurar que tenemos un ID de conversación activo
                const currentConvId = await getOrCreateConversation();

                // 3. Enviar el mensaje a la API de Botpress
                const sendResponse = await fetch(`${BASE_URL}/messages`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${BOT_API_KEY}`,
                        'x-bot-id': BOT_ID,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        conversationId: currentConvId,
                        payload: {
                            type: 'text',
                            text: messageText
                        }
                    })
                });

                // 4. Esperar una breve ventana y recuperar la respuesta del Bot
                // (Botpress procesa de forma asíncrona, solicitamos la lista de mensajes actualizada)
                await new Promise(resolve => setTimeout(resolve, 2000)); 

                const listResponse = await fetch(`${BASE_URL}/conversations/${currentConvId}/messages`, {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${BOT_API_KEY}`,
                        'x-bot-id': BOT_ID
                    }
                });
                
                const messagesData = await listResponse.json();
                
                // Quitamos el indicador de carga
                chatWindow.removeChild(loadingDiv);

                // Buscamos el último mensaje que pertenezca al bot y no al usuario
                const botMessages = messagesData.messages.filter(m => m.userId !== BOT_ID); // Dependiendo de la estructura v1, filtraremos los mensajes entrantes
                
                if (messagesData.messages && messagesData.messages.length > 0) {
                    // Tomamos el último mensaje de la lista (asumiendo que es la respuesta de la IA)
                    const lastMessage = messagesData.messages[0]; // La API suele devolverlos ordenados por el más reciente primero
                    
                    let aiResponse = "";
                    if(lastMessage.payload && lastMessage.payload.text) {
                        aiResponse = lastMessage.payload.text;
                    } else {
                        aiResponse = "Procesamiento completado. Por favor, verifica las alertas en el panel principal.";
                    }
                    
                    appendMessage('ai', aiResponse, '🤖');
                } else {
                    appendMessage('ai', "Reporte recibido. Procesando mitigación en segundo plano.", '🤖');
                }

            } catch (error) {
                console.error("Error en la conexión con la IA:", error);
                if (chatWindow.contains(loadingDiv)) {
                    chatWindow.removeChild(loadingDiv);
                }
                appendMessage('ai', "⚠️ Error del sistema: No se pudo establecer comunicación con el núcleo de la IA.", '❌');
            }
        });
    </script>

</body>
</html>
