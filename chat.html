<!DOCTYPE html>

<head>

    <title>Micro-SOC - Asistente de IA</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>

            margin: 0;

        #bp-embedded-webchat {
            width: 100%;
            height: 100%;
        }

    <main class="w-full max-w-4xl mx-auto p-4 flex-grow">
